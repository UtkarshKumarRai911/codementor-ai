[build]
builder = "nixpacks"
buildCommand = "cd backend && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd backend && python manage.py migrate && python manage.py index_knowledge_base && gunicorn codementor.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180"
healthcheckPath = "/api/health/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[nixpacks]
pythonVersion = "3.11"
